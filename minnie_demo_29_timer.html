    <style>body {
  font-family: arial;
  margin: 0;
  padding: none;
}

.emscripten { padding-right: 0; margin-left: auto; margin-right: auto; display: block; }
div.emscripten { text-align: center; }
div.emscripten_border { border: 1px solid black; }
/* the canvas *must not* have any border or padding, or mouse coords will be wrong */
canvas.emscripten { border: 0px none; background-color: black; }

#emscripten_logo {
  display: inline-block;
  margin: 0;
  padding: 6px;
  width: 265px;
}

.spinner {
  height: 30px;
  width: 30px;
  margin: 0;
  margin-top: 20px;
  margin-left: 20px;
  display: inline-block;
  vertical-align: top;

  -webkit-animation: rotation .8s linear infinite;
  -moz-animation: rotation .8s linear infinite;
  -o-animation: rotation .8s linear infinite;
  animation: rotation 0.8s linear infinite;

  border-left: 5px solid rgb(235, 235, 235);
  border-right: 5px solid rgb(235, 235, 235);
  border-bottom: 5px solid rgb(235, 235, 235);
  border-top: 5px solid rgb(120, 120, 120);

  border-radius: 100%;
  background-color: rgb(189, 215, 46);
}

@-webkit-keyframes rotation {
  from {-webkit-transform: rotate(0deg);}
  to {-webkit-transform: rotate(360deg);}
}
@-moz-keyframes rotation {
  from {-moz-transform: rotate(0deg);}
  to {-moz-transform: rotate(360deg);}
}
@-o-keyframes rotation {
  from {-o-transform: rotate(0deg);}
  to {-o-transform: rotate(360deg);}
}
@keyframes rotation {
  from {transform: rotate(0deg);}
  to {transform: rotate(360deg);}
}

#status {
  display: inline-block;
  vertical-align: top;
  margin-top: 30px;
  margin-left: 20px;
  font-weight: bold;
  color: rgb(120, 120, 120);
}

#progress {
  height: 20px;
  width: 300px;
}

#controls {
  display: inline-block;
  float: right;
  vertical-align: top;
  margin-top: 30px;
  margin-right: 20px;
}

#output {
  width: 100%;
  height: 200px;
  margin: 0 auto;
  margin-top: 10px;
  border-left: 0px;
  border-right: 0px;
  padding-left: 0px;
  padding-right: 0px;
  display: block;
  background-color: black;
  color: white;
  font-family: 'Lucida Console', Monaco, monospace;
  outline: none;
}

    /* ── Performance HUD overlay ── */
    #perfOverlay {
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.82);
      color: #e0e0e0;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.45;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      pointer-events: none;
      user-select: none;
      min-width: 210px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: opacity 0.2s;
    }
    #perfOverlay.hidden { opacity: 0; pointer-events: none; }
    #perfOverlay .perf-title {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 3px;
    }
    #perfOverlay .perf-row {
      display: flex;
      justify-content: space-between;
      padding: 1px 0;
    }
    #perfOverlay .perf-label { color: #999; }
    #perfOverlay .perf-value { font-weight: bold; }
    #perfOverlay .perf-fps   { color: #6f6; }
    #perfOverlay .perf-ft    { color: #ccc; }
    #perfOverlay .perf-dc    { color: #8cf; }
    #perfOverlay .perf-mem   { color: #fc6; }
    #perfOverlay .perf-warn  { color: #f66; }
    #perfGraph {
      margin-top: 4px;
      height: 32px;
      background: rgba(255,255,255,0.04);
      border-radius: 3px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }
    #perfGraph .bar {
      flex: 1;
      min-width: 1px;
      background: #4a4;
      margin-right: 1px;
      transition: height 0.05s;
    }
    #perfGraph .bar.warn { background: #cc4; }
    #perfGraph .bar.bad  { background: #c44; }
    #perfToggleHint {
      position: fixed;
      bottom: 6px;
      right: 8px;
      z-index: 10001;
      font-family: 'Consolas', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
    }

    <script type='text/javascript'>
      var statusElement = document.getElementById('status');
      var progressElement = document.getElementById('progress');
      var spinnerElement = document.getElementById('spinner');
      var canvasElement = document.getElementById('canvas');
      var outputElement = document.getElementById('output');
      if (outputElement) outputElement.value = ''; // clear browser cache

      // As a default initial behavior, pop up an alert when webgl context is lost. To make your
      // application robust, you may want to override this behavior before shipping!
      // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
      canvasElement.addEventListener('webglcontextlost', (e) => {
        alert('WebGL context lost. You will need to reload the page.');
        e.preventDefault();
      }, false);

      var Module = {
        print(...args) {
          console.log(...args);
          // These replacements are necessary if you render to raw HTML
          //text = text.replace(/&/g, "&amp;");
          //text = text.replace(/</g, "&lt;");
          //text = text.replace(/>/g, "&gt;");
          //text = text.replace('\n', '<br>', 'g');
          if (outputElement) {
            var text = args.join(' ');
            outputElement.value += text + "\n";
            outputElement.scrollTop = outputElement.scrollHeight; // focus on bottom
          }
        },
        canvas: canvasElement,
        setStatus(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          // if this is a progress update, skip it if too soon
          if (m && now - Module.setStatus.last.time < 30) return;
          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;
          if (m) {
            text = m[1];
            progressElement.value = parseInt(m[2])*100;
            progressElement.max = parseInt(m[4])*100;
            progressElement.hidden = false;
            spinnerElement.hidden = false;
          } else {
            progressElement.value = null;
            progressElement.max = null;
            progressElement.hidden = true;
            if (!text) spinnerElement.style.display = 'none';
          }
          statusElement.innerHTML = text;
        },
        totalDependencies: 0,
        monitorRunDependencies(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Downloading...');
      window.onerror = (event) => {
        // TODO: do not warn on ok events like simulating an infinite loop or exitStatus
        Module.setStatus('Exception thrown, see JavaScript console');
        spinnerElement.style.display = 'none';
        Module.setStatus = (text) => {
          if (text) console.error('[post-exception status] ' + text);
        };
      };
    </script>

    <script>
    /* ── Performance HUD ── */
    (function() {
      'use strict';

      var HIST = 60;           /* number of bars in the graph */
      var UPDATE_HZ = 4;       /* HUD text updates per second */

      var frameTimes  = [];
      var drawCalls   = 0;
      var triCount    = 0;
      var frameDraws  = 0;
      var frameTris   = 0;
      var programCount = 0;
      var lastTime    = 0;
      var frameCount  = 0;
      var accumTime   = 0;
      var minFt = 1e9, maxFt = 0;
      var lastHudUpdate = 0;
      var visible = true;

      var overlay  = document.getElementById('perfOverlay');
      var elFps    = document.getElementById('perf-fps');
      var elFt     = document.getElementById('perf-ft');
      var elMM     = document.getElementById('perf-minmax');
      var elDc     = document.getElementById('perf-dc');
      var elTri    = document.getElementById('perf-tri');
      var elProg   = document.getElementById('perf-prog');
      var graph    = document.getElementById('perfGraph');
      var hint     = document.getElementById('perfToggleHint');

      /* Pre-create graph bars */
      var bars = [];
      for (var i = 0; i < HIST; i++) {
        var b = document.createElement('div');
        b.className = 'bar';
        graph.appendChild(b);
        bars.push(b);
      }

      /* Toggle with P key */
      document.addEventListener('keydown', function(e) {
        if (e.key === 'p' || e.key === 'P') {
          visible = !visible;
          overlay.classList.toggle('hidden', !visible);
        }
      });

      /* ─── WebGL draw-call interception ─── */
      function hookGL(gl) {
        if (!gl || gl.__perfHooked) return;
        gl.__perfHooked = true;

        var drawFns = [
          'drawArrays', 'drawElements',
          'drawArraysInstanced', 'drawElementsInstanced',
          'drawRangeElements'
        ];

        drawFns.forEach(function(fn) {
          if (!gl[fn]) return;
          var orig = gl[fn].bind(gl);
          gl[fn] = function() {
            drawCalls++;
            /* Count triangles for drawArrays/drawElements */
            if (fn === 'drawArrays' || fn === 'drawArraysInstanced') {
              var mode = arguments[0];
              var count = arguments[fn === 'drawArrays' ? 2 : 2];
              if (mode === gl.TRIANGLES)      triCount += (count / 3) | 0;
              else if (mode === gl.TRIANGLE_STRIP || mode === gl.TRIANGLE_FAN)
                                              triCount += Math.max(0, count - 2);
            } else if (fn === 'drawElements' || fn === 'drawElementsInstanced') {
              var mode = arguments[0];
              var count = arguments[1];
              if (mode === gl.TRIANGLES)      triCount += (count / 3) | 0;
              else if (mode === gl.TRIANGLE_STRIP || mode === gl.TRIANGLE_FAN)
                                              triCount += Math.max(0, count - 2);
            }
            return orig.apply(null, arguments);
          };
        });

        /* Track program count */
        var origCreateProgram = gl.createProgram.bind(gl);
        var origDeleteProgram = gl.deleteProgram.bind(gl);
        gl.createProgram = function() {
          programCount++;
          return origCreateProgram.apply(null, arguments);
        };
        gl.deleteProgram = function() {
          programCount = Math.max(0, programCount - 1);
          return origDeleteProgram.apply(null, arguments);
        };
      }

      /* Hook the canvas once Emscripten creates its GL context */
      function tryHook() {
        var c = document.getElementById('canvas');
        if (c) {
          var origGetCtx = c.getContext.bind(c);
          /* Wrap getContext to intercept Emscripten's GL context creation.
             Pass the GL context directly to hookGL to avoid re-entrant
             getContext calls that would cause infinite recursion. */

            if (ctx && !ctx.__perfHooked && (type.indexOf('webgl') !== -1)) {
              hookGL(ctx);
            }
            return ctx;
          };

          var existing = origGetCtx('webgl2') || origGetCtx('webgl');
          hookGL(existing);
        }
      }
      tryHook();

      /* ─── Frame measurement via rAF wrapper ─── */
      var origRAF = window.requestAnimationFrame;
      window.requestAnimationFrame = function(cb) {
        return origRAF.call(window, function wrappedFrame(ts) {
          /* Measure previous frame */
          if (lastTime > 0) {
            var dt = ts - lastTime;
            frameTimes.push(dt);
            if (frameTimes.length > HIST) frameTimes.shift();
            accumTime += dt;
            frameCount++;
            if (dt < minFt) minFt = dt;
            if (dt > maxFt) maxFt = dt;
          }
          lastTime = ts;
          frameDraws = drawCalls;
          frameTris  = triCount;
          drawCalls  = 0;
          triCount   = 0;

          /* Invoke the real callback */
          cb(ts);

          /* Update HUD text at reduced rate */
          if (ts - lastHudUpdate > 1000 / UPDATE_HZ && frameCount > 0 && visible) {
            lastHudUpdate = ts;
            var avgFt = accumTime / frameCount;
            var fps   = 1000 / avgFt;

            elFps.textContent  = fps.toFixed(1);
            elFt.textContent   = avgFt.toFixed(2) + ' ms';
            elMM.textContent   = minFt.toFixed(1) + ' / ' + maxFt.toFixed(1) + ' ms';
            elDc.textContent   = frameDraws;
            elTri.textContent  = frameTris;
            elProg.textContent = programCount;

            /* Color FPS value */
            elFps.style.color = fps >= 55 ? '#6f6' : fps >= 30 ? '#cc4' : '#f66';

            /* Update graph bars */
            var maxBar = 33.33;  /* 2x a 60fps frame */
            for (var i = 0; i < HIST; i++) {
              var ft = frameTimes[i] || 0;
              var pct = Math.min(100, (ft / maxBar) * 100);
              bars[i].style.height = pct + '%';
              bars[i].className = 'bar' + (ft > 33.33 ? ' bad' : ft > 16.67 ? ' warn' : '');
            }

            /* Reset running stats every 2 seconds */
            if (accumTime > 2000) {
              frameCount = 0;
              accumTime  = 0;
              minFt = 1e9;
              maxFt = 0;
            }
          }
        });
      };

      /* Also handle Emscripten's emscripten_set_main_loop which may use
         setInterval instead of rAF.  Wrap setInterval too. */
      var origSI = window.setInterval;
      window.setInterval = function(fn, ms) {
        if (typeof fn === 'function' && ms <= 17) {
          /* Likely the main loop — wrap it */
          var wrapped = function() {
            var ts = performance.now();
            if (lastTime > 0) {
              var dt = ts - lastTime;
              frameTimes.push(dt);
              if (frameTimes.length > HIST) frameTimes.shift();
              accumTime += dt;
              frameCount++;
              if (dt < minFt) minFt = dt;
              if (dt > maxFt) maxFt = dt;
            }
            lastTime = ts;
            frameDraws = drawCalls;
            frameTris  = triCount;
            drawCalls  = 0;
            triCount   = 0;
            fn();
          };
          return origSI.call(window, wrapped, ms);
        }
        return origSI.apply(window, arguments);
      };

      /* Hide hint after 3 seconds */
      setTimeout(function() {
        if (hint) hint.style.opacity = '0';
        setTimeout(function() { if (hint) hint.style.display = 'none'; }, 500);
      }, 3000);

    })();
    </script>
